name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Run tests
        run: swift test

      - name: Package app
        run: scripts/package-app.sh release

      - name: Sign app
        run: codesign --force --deep --sign - outputs/Worklog.app

      - name: Create archive
        run: |
          ditto -c -k --sequesterRsrc --keepParent outputs/Worklog.app outputs/Worklog.app.zip
          shasum -a 256 outputs/Worklog.app.zip > outputs/Worklog.app.zip.sha256

      - name: Write release notes
        run: |
          cat > outputs/release-notes.md <<'EOF'
          ## Install

          Download `Worklog.app.zip`, unzip it, and move `Worklog.app` to `/Applications`.

          You can also install the latest release from Terminal:

          ```sh
          curl -fsSL https://raw.githubusercontent.com/0xIvan/WorkLog/main/scripts/install-release.sh | bash
          ```

          This release is ad hoc signed and not notarized. On first launch, macOS may require right-clicking `Worklog.app` and choosing `Open`.
          EOF

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" outputs/Worklog.app.zip outputs/Worklog.app.zip.sha256 --clobber
          else
            gh release create "$TAG" \
              outputs/Worklog.app.zip \
              outputs/Worklog.app.zip.sha256 \
              --title "Worklog $TAG" \
              --notes-file outputs/release-notes.md
          fi
